<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceTracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273344;
      --border: #334155;
      --accent: #38bdf8;
      --income: #34d399;
      --expense: #f87171;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 0.75rem; }
    header h1 { font-size: 1.4rem; color: var(--accent); }
    nav { display: flex; gap: 0.5rem; margin-left: auto; }
    nav button { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all .2s; }
    nav button.active, nav button:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
    .page { display: none; }
    .page.active { display: block; }
    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: .05em; }
    .card .big { font-size: 2rem; font-weight: 700; }
    .income-color { color: var(--income); }
    .expense-color { color: var(--expense); }
    .neutral-color { color: var(--accent); }
    /* Grid */
    .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    /* Form */
    .form-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 160px; }
    label { font-size: 0.8rem; color: var(--muted); }
    input, select, textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.9rem; outline: none; width: 100%; }
    input:focus, select:focus { border-color: var(--accent); }
    .btn { padding: 0.55rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity .2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-income { background: var(--income); color: var(--bg); }
    .btn-expense { background: var(--expense); color: #fff; }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
    .btn-danger { background: var(--expense); color: #fff; }
    .btn-edit { background: var(--accent); color: var(--bg); }
    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-income { background: rgba(52,211,153,.2); color: var(--income); }
    .badge-expense { background: rgba(248,113,113,.2); color: var(--expense); }
    /* Breakdown bars */
    .breakdown-item { margin-bottom: 0.85rem; }
    .breakdown-header { display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .bar-bg { background: var(--surface2); border-radius: 20px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 20px; transition: width .5s; }
    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 520px; }
    .modal h3 { margin-bottom: 1rem; }
    .alert { padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 0.75rem; font-size: 0.85rem; }
    .alert-error { background: rgba(248,113,113,.2); color: var(--expense); border: 1px solid var(--expense); }
    .alert-success { background: rgba(52,211,153,.2); color: var(--income); border: 1px solid var(--income); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header h2 { font-size: 1.1rem; }
    .filter-bar { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: flex-end; margin-bottom: 1rem; }
    .filter-bar .form-group { min-width: 130px; flex: none; }
    .empty { text-align: center; padding: 2rem; color: var(--muted); }
    .tab-btns { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 0.35rem 0.9rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
    .tab-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  </style>
</head>
<body>
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  <h1>FinanceTracker</h1>
  <nav>
    <button class="active" data-page="dashboard">Dashboard</button>
    <button data-page="transactions">Transactions</button>
    <button data-page="add">+ Add</button>
  </nav>
</header>

<main>
  <!-- DASHBOARD -->
  <section id="page-dashboard" class="page active">
    <div class="grid3" id="summary-cards">
      <div class="card"><h2>Total Income</h2><div class="big income-color" id="s-income">—</div></div>
      <div class="card"><h2>Total Expenses</h2><div class="big expense-color" id="s-expense">—</div></div>
      <div class="card"><h2>Net Balance</h2><div class="big neutral-color" id="s-net">—</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="card">
        <div class="section-header"><h2>Category Breakdown</h2>
          <div style="display:flex;gap:.4rem">
            <button class="tab-btn active" data-btype="">All</button>
            <button class="tab-btn" data-btype="income">Income</button>
            <button class="tab-btn" data-btype="expense">Expense</button>
          </div>
        </div>
        <div id="breakdown-list"><div class="empty">No data</div></div>
      </div>
      <div class="card">
        <div class="section-header"><h2>Recent Transactions</h2></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Type</th></tr></thead>
            <tbody id="recent-tbody"><tr><td colspan="4" class="empty">No transactions</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <!-- TRANSACTIONS -->
  <section id="page-transactions" class="page">
    <div class="section-header">
      <h2>Transaction History</h2>
      <button class="btn btn-primary" id="export-btn">⬇ Export CSV</button>
    </div>
    <div class="filter-bar">
      <div class="form-group"><label>From Date</label><input type="date" id="f-from"/></div>
      <div class="form-group"><label>To Date</label><input type="date" id="f-to"/></div>
      <div class="form-group"><label>Category</label>
        <select id="f-cat"><option value="">All</option></select>
      </div>
      <div class="form-group"><label>Type</label>
        <select id="f-type"><option value="">All</option><option value="income">Income</option><option value="expense">Expense</option></select>
      </div>
      <button class="btn btn-primary" id="filter-btn">Filter</button>
      <button class="btn" style="background:var(--surface2);color:var(--muted)" id="reset-btn">Reset</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Actions</th></tr></thead>
          <tbody id="txn-tbody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ADD -->
  <section id="page-add" class="page">
    <div class="card" style="max-width:560px;margin:0 auto">
      <div class="section-header"><h2>Log New Transaction</h2></div>
      <div id="add-alert"></div>
      <form id="add-form">
        <div class="form-row">
          <div class="form-group" style="flex:none">
            <label>Type</label>
            <div style="display:flex;gap:.5rem;margin-top:.15rem">
              <button type="button" class="btn btn-income active-type" id="btn-income" onclick="setType('income')">Income</button>
              <button type="button" class="btn btn-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
            </div>
            <input type="hidden" id="txn-type" value="income"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Amount</label>
            <input type="number" id="txn-amount" min="0.01" step="0.01" placeholder="0.00" required/>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="txn-date" required/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <input list="cat-suggestions" id="txn-category" placeholder="e.g. Food, Salary…" required/>
            <datalist id="cat-suggestions">
              <option value="Salary"/><option value="Freelance"/><option value="Investment"/>
              <option value="Food"/><option value="Rent"/><option value="Transport"/>
              <option value="Utilities"/><option value="Healthcare"/><option value="Entertainment"/>
              <option value="Shopping"/><option value="Other"/>
            </datalist>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1 1 100%">
            <label>Description</label>
            <input type="text" id="txn-desc" placeholder="Brief description…" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Save Transaction</button>
      </form>
    </div>
  </section>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="section-header"><h3>Edit Transaction</h3><button class="btn btn-sm" style="background:var(--surface2);color:var(--muted)" onclick="closeModal()">✕</button></div>
    <div id="edit-alert"></div>
    <form id="edit-form">
      <input type="hidden" id="edit-id"/>
      <div class="form-row">
        <div class="form-group" style="flex:none">
          <label>Type</label>
          <div style="display:flex;gap:.5rem;margin-top:.15rem">
            <button type="button" class="btn btn-income" id="edit-btn-income" onclick="setEditType('income')">Income</button>
            <button type="button" class="btn btn-expense" id="edit-btn-expense" onclick="setEditType('expense')">Expense</button>
          </div>
          <input type="hidden" id="edit-type"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Amount</label><input type="number" id="edit-amount" min="0.01" step="0.01" required/></div>
        <div class="form-group"><label>Date</label><input type="date" id="edit-date" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category</label><input list="cat-suggestions" id="edit-category" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1 1 100%"><label>Description</label><input type="text" id="edit-desc" required/></div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem">
        <button type="submit" class="btn btn-primary" style="flex:1">Update</button>
        <button type="button" class="btn" style="background:var(--surface2);color:var(--muted)" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const API = '';
  let currentPage = 'dashboard';
  let breakdownType = '';

  // ── Navigation ─────────────────────────────────────────────────────────
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = btn.dataset.page;
      switchPage(p);
    });
  });

  function switchPage(p) {
    currentPage = p;
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.querySelector(`nav button[data-page="${p}"]`).classList.add('active');
    if (p === 'dashboard') { loadSummary(); loadBreakdown(); loadRecent(); }
    if (p === 'transactions') { loadTransactions(); loadCategories(); }
  }

  // ── Currency format ────────────────────────────────────────────────────
  function fmt(n) { return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

  // ── API helpers ────────────────────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Request failed');
    }
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Dashboard ──────────────────────────────────────────────────────────
  async function loadSummary() {
    try {
      const s = await apiFetch('/api/summary');
      document.getElementById('s-income').textContent = fmt(s.total_income);
      document.getElementById('s-expense').textContent = fmt(s.total_expense);
      const netEl = document.getElementById('s-net');
      netEl.textContent = fmt(s.net_balance);
      netEl.className = 'big ' + (s.net_balance >= 0 ? 'income-color' : 'expense-color');
    } catch(e) { console.error(e); }
  }

  async function loadBreakdown() {
    try {
      let url = '/api/breakdown';
      if (breakdownType) url += '?txn_type=' + breakdownType;
      const data = await apiFetch(url);
      const el = document.getElementById('breakdown-list');
      if (!data.length) { el.innerHTML = '<div class="empty">No data</div>'; return; }
      const max = Math.max(...data.map(d => d.total));
      el.innerHTML = data.map(d => {
        const pct = max > 0 ? (d.total / max * 100).toFixed(1) : 0;
        const color = d.type === 'income' ? 'var(--income)' : 'var(--expense)';
        return `<div class="breakdown-item">
          <div class="breakdown-header">
            <span>${escHtml(d.category)} <span class="badge badge-${d.type}">${d.type}</span></span>
            <span style="font-weight:700">${fmt(d.total)}</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }).join('');
    } catch(e) { console.error(e); }
  }

  document.querySelectorAll('[data-btype]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-btype]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      breakdownType = btn.dataset.btype;
      loadBreakdown();
    });
  });

  async function loadRecent() {
    try {
      const data = await apiFetch('/api/transactions');
      const tbody = document.getElementById('recent-tbody');
      const recent = data.slice(0, 8);
      if (!recent.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No transactions</td></tr>'; return; }
      tbody.innerHTML = recent.map(t => `
        <tr>
          <td>${t.txn_date}</td>
          <td>${escHtml(t.description)}</td>
          <td style="font-weight:700;color:${t.type==='income'?'var(--income)':'var(--expense)'}">${fmt(t.amount)}</td>
          <td><span class="badge badge-${t.type}">${t.type}</span></td>
        </tr>`).join('');
    } catch(e) { console.error(e); }
  }

  // ── Transactions ───────────────────────────────────────────────────────
  async function loadTransactions() {
    const params = new URLSearchParams();
    const from = document.getElementById('f-from').value;
    const to = document.getElementById('f-to').value;
    const cat = document.getElementById('f-cat').value;
    const type = document.getElementById('f-type').value;
    if (from) params.set('date_from', from);
    if (to) params.set('date_to', to);
    if (cat) params.set('category', cat);
    if (type) params.set('txn_type', type);
    const qs = params.toString();
    try {
      const data = await apiFetch('/api/transactions' + (qs ? '?' + qs : ''));
      renderTxnTable(data);
    } catch(e) { showTxnError(e.message); }
  }

  function renderTxnTable(data) {
    const tbody = document.getElementById('txn-tbody');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No transactions found</td></tr>'; return; }
    tbody.innerHTML = data.map(t => `
      <tr>
        <td>${t.txn_date}</td>
        <td>${escHtml(t.description)}</td>
        <td>${escHtml(t.category)}</td>
        <td><span class="badge badge-${t.type}">${t.type}</span></td>
        <td style="font-weight:700;color:${t.type==='income'?'var(--income)':'var(--expense)'}">${fmt(t.amount)}</td>
        <td style="display:flex;gap:.35rem">
          <button class="btn btn-sm btn-edit" onclick="openEdit(${t.id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteTxn(${t.id})">Del</button>
        </td>
      </tr>`).join('');
  }

  function showTxnError(msg) {
    const tbody = document.getElementById('txn-tbody');
    tbody.innerHTML = `<tr><td colspan="6" class="empty" style="color:var(--expense)">${escHtml(msg)}</td></tr>`;
  }

  async function loadCategories() {
    try {
      const cats = await apiFetch('/api/categories');
      const sel = document.getElementById('f-cat');
      const cur = sel.value;
      sel.innerHTML = '<option value="">All</option>' + cats.map(c => `<option value="${escHtml(c)}"${c===cur?' selected':''}>${escHtml(c)}</option>`).join('');
    } catch(e) { console.error(e); }
  }

  document.getElementById('filter-btn').addEventListener('click', loadTransactions);
  document.getElementById('reset-btn').addEventListener('click', () => {
    ['f-from','f-to'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-cat').value = '';
    document.getElementById('f-type').value = '';
    loadTransactions();
  });

  document.getElementById('export-btn').addEventListener('click', () => {
    const params = new URLSearchParams();
    const from = document.getElementById('f-from').value;
    const to = document.getElementById('f-to').value;
    const cat = document.getElementById('f-cat').value;
    const type = document.getElementById('f-type').value;
    if (from) params.set('date_from', from);
    if (to) params.set('date_to', to);
    if (cat) params.set('category', cat);
    if (type) params.set('txn_type', type);
    const qs = params.toString();
    window.location.href = '/api/export' + (qs ? '?' + qs : '');
  });

  async function deleteTxn(id) {
    if (!confirm('Delete this transaction?')) return;
    try {
      await apiFetch('/api/transactions/' + id, { method: 'DELETE' });
      loadTransactions();
    } catch(e) { alert('Error: ' + e.message); }
  }

  // ── Add Form ───────────────────────────────────────────────────────────
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('txn-date').value = today;

  function setType(t) {
    document.getElementById('txn-type').value = t;
    document.getElementById('btn-income').style.opacity = t === 'income' ? '1' : '0.45';
    document.getElementById('btn-expense').style.opacity = t === 'expense' ? '1' : '0.45';
  }
  setType('income');

  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert('add-alert');
    const body = {
      type: document.getElementById('txn-type').value,
      amount: parseFloat(document.getElementById('txn-amount').value),
      description: document.getElementById('txn-desc').value,
      category: document.getElementById('txn-category').value,
      txn_date: document.getElementById('txn-date').value,
    };
    try {
      await apiFetch('/api/transactions', { method: 'POST', body: JSON.stringify(body) });
      showAlert('add-alert', 'Transaction saved successfully!', 'success');
      e.target.reset();
      document.getElementById('txn-date').value = today;
      setType('income');
    } catch(err) {
      showAlert('add-alert', err.message, 'error');
    }
  });

  // ── Edit Modal ─────────────────────────────────────────────────────────
  async function openEdit(id) {
    try {
      const t = await apiFetch('/api/transactions/' + id);
      document.getElementById('edit-id').value = t.id;
      document.getElementById('edit-amount').value = t.amount;
      document.getElementById('edit-date').value = t.txn_date;
      document.getElementById('edit-category').value = t.category;
      document.getElementById('edit-desc').value = t.description;
      setEditType(t.type);
      clearAlert('edit-alert');
      document.getElementById('edit-modal').classList.add('open');
    } catch(e) { alert('Could not load transaction: ' + e.message); }
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  function setEditType(t) {
    document.getElementById('edit-type').value = t;
    document.getElementById('edit-btn-income').style.opacity = t === 'income' ? '1' : '0.45';
    document.getElementById('edit-btn-expense').style.opacity = t === 'expense' ? '1' : '0.45';
  }

  document.getElementById('edit-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert('edit-alert');
    const id = document.getElementById('edit-id').value;
    const body = {
      type: document.getElementById('edit-type').value,
      amount: parseFloat(document.getElementById('edit-amount').value),
      description: document.getElementById('edit-desc').value,
      category: document.getElementById('edit-category').value,
      txn_date: document.getElementById('edit-date').value,
    };
    try {
      await apiFetch('/api/transactions/' + id, { method: 'PUT', body: JSON.stringify(body) });
      closeModal();
      loadTransactions();
    } catch(err) {
      showAlert('edit-alert', err.message, 'error');
    }
  });

  document.getElementById('edit-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('edit-modal')) closeModal();
  });

  // ── Utilities ──────────────────────────────────────────────────────────
  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function showAlert(containerId, msg, type) {
    const el = document.getElementById(containerId);
    el.innerHTML = `<div class="alert alert-${type}">${escHtml(msg)}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 4000);
  }

  function clearAlert(containerId) {
    document.getElementById(containerId).innerHTML = '';
  }

  // ── Init ───────────────────────────────────────────────────────────────
  loadSummary();
  loadBreakdown();
  loadRecent();
</script>
</body>
</html>
